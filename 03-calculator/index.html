<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1c1c1e;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    .calculator {
      width: 320px;
      background: #1c1c1e;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      border: 1px solid #2c2c2e;
    }

    .display {
      padding: 24px 24px 16px;
      text-align: right;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .expression {
      font-size: 1rem;
      color: #636366;
      min-height: 22px;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result {
      font-size: 3.2rem;
      font-weight: 200;
      color: #ffffff;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #2c2c2e;
    }

    button {
      padding: 0;
      height: 78px;
      font-size: 1.4rem;
      font-family: inherit;
      font-weight: 400;
      border: none;
      cursor: pointer;
      transition: filter 0.1s;
      outline: none;
    }

    button:active { filter: brightness(1.3); }

    .btn-dark    { background: #3a3a3c; color: #fff; }
    .btn-light   { background: #d4d4d2; color: #000; font-size: 1.3rem; }
    .btn-orange  { background: #ff9f0a; color: #fff; }
    .btn-zero    { grid-column: span 2; text-align: left; padding-left: 28px; font-size: 1.4rem; }
  </style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="buttons">
    <!-- Row 1 -->
    <button class="btn-light" onclick="clearAll()">AC</button>
    <button class="btn-light" onclick="toggleSign()">+/−</button>
    <button class="btn-light" onclick="percentage()">%</button>
    <button class="btn-orange" onclick="setOp('÷')">÷</button>
    <!-- Row 2 -->
    <button class="btn-dark" onclick="appendNum('7')">7</button>
    <button class="btn-dark" onclick="appendNum('8')">8</button>
    <button class="btn-dark" onclick="appendNum('9')">9</button>
    <button class="btn-orange" onclick="setOp('×')">×</button>
    <!-- Row 3 -->
    <button class="btn-dark" onclick="appendNum('4')">4</button>
    <button class="btn-dark" onclick="appendNum('5')">5</button>
    <button class="btn-dark" onclick="appendNum('6')">6</button>
    <button class="btn-orange" onclick="setOp('−')">−</button>
    <!-- Row 4 -->
    <button class="btn-dark" onclick="appendNum('1')">1</button>
    <button class="btn-dark" onclick="appendNum('2')">2</button>
    <button class="btn-dark" onclick="appendNum('3')">3</button>
    <button class="btn-orange" onclick="setOp('+')">+</button>
    <!-- Row 5 -->
    <button class="btn-dark btn-zero" onclick="appendNum('0')">0</button>
    <button class="btn-dark" onclick="appendDot()">.</button>
    <button class="btn-orange" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let current    = '0';
  let prev       = '';
  let operator   = '';
  let resetNext  = false;

  const resultEl    = document.getElementById('result');
  const expressionEl = document.getElementById('expression');

  function updateDisplay() {
    resultEl.textContent = current;
    resultEl.style.fontSize = current.length > 9 ? '2rem' : '3.2rem';
  }

  function appendNum(n) {
    if (resetNext) { current = ''; resetNext = false; }
    if (current === '0' && n !== '.') current = '';
    current += n;
    updateDisplay();
  }

  function appendDot() {
    if (resetNext) { current = '0'; resetNext = false; }
    if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function clearAll() {
    current = '0'; prev = ''; operator = '';
    expressionEl.textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    current = String(parseFloat(current) * -1);
    updateDisplay();
  }

  function percentage() {
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  function setOp(op) {
    if (operator && !resetNext) calculate(true);
    prev = current;
    operator = op;
    resetNext = true;
    expressionEl.textContent = `${prev} ${op}`;
  }

  function calculate(chain = false) {
    if (!operator || !prev) return;
    const a = parseFloat(prev);
    const b = parseFloat(current);
    let result;

    switch (operator) {
      case '+': result = a + b; break;
      case '−': result = a - b; break;
      case '×': result = a * b; break;
      case '÷': result = b !== 0 ? a / b : 'Error'; break;
    }

    if (!chain) {
      expressionEl.textContent = `${prev} ${operator} ${current} =`;
      operator = '';
    }

    current = typeof result === 'number'
      ? parseFloat(result.toFixed(10)).toString()
      : result;

    prev = '';
    resetNext = true;
    updateDisplay();
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '.') appendDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('−');
    else if (e.key === '*') setOp('×');
    else if (e.key === '/') { e.preventDefault(); setOp('÷'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }
  });
</script>

</body>
</html>
