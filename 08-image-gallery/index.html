<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #111;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      padding: 48px 24px;
    }

    header { text-align: center; margin-bottom: 40px; }
    h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.02em; }
    .sub { color: #666; margin-top: 6px; font-size: 0.95rem; }

    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .filter-btn {
      padding: 8px 22px;
      border: 1.5px solid #333;
      border-radius: 30px;
      background: transparent;
      color: #aaa;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: #fff; color: #fff; }
    .filter-btn.active { background: #fff; color: #111; border-color: #fff; }

    .gallery {
      columns: 3;
      column-gap: 14px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (max-width: 768px) { .gallery { columns: 2; } }
    @media (max-width: 480px) { .gallery { columns: 1; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }

    .gallery-item:hover img { transform: scale(1.05); }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: flex-end;
      padding: 16px;
      transition: background 0.3s;
    }

    .gallery-item:hover .overlay { background: rgba(0,0,0,0.4); }

    .gallery-item .caption {
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
    }

    .gallery-item:hover .caption { opacity: 1; transform: translateY(0); }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 12px;
      object-fit: contain;
      animation: fadeInLb 0.25s ease;
    }

    @keyframes fadeInLb {
      from { opacity:0; transform: scale(0.95); }
      to   { opacity:1; transform: scale(1); }
    }

    .lb-caption {
      margin-top: 16px;
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
    }

    .lb-close {
      position: fixed;
      top: 20px; right: 24px;
      font-size: 2rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      line-height: 1;
    }

    .lb-close:hover { color: #fff; }

    .lb-nav {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .lb-nav button {
      padding: 10px 28px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .lb-nav button:hover { background: rgba(255,255,255,0.2); }

    .no-items {
      text-align: center;
      color: #555;
      padding: 60px 0;
      max-width: 1100px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<header>
  <h1>Photo Gallery</h1>
  <p class="sub">Click any image to open the lightbox · Filter by category</p>
</header>

<div class="filters" id="filters"></div>
<div class="gallery" id="gallery"></div>
<p class="no-items" id="no-items" style="display:none">No photos in this category yet.</p>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <img id="lb-img" src="" alt=""/>
  <div class="lb-caption" id="lb-caption"></div>
  <div class="lb-nav">
    <button onclick="lbNav(-1)">← Prev</button>
    <button onclick="lbNav(1)">Next →</button>
  </div>
</div>

<script>
  // Using Picsum Photos (Lorem Picsum) — no API key needed
  const photos = [
    { id:10,  title:"Forest Path",    cat:"Nature"  },
    { id:20,  title:"City Lights",    cat:"Urban"   },
    { id:30,  title:"Mountain Peak",  cat:"Nature"  },
    { id:40,  title:"Ocean Waves",    cat:"Nature"  },
    { id:50,  title:"Architecture",   cat:"Urban"   },
    { id:60,  title:"Street Art",     cat:"Urban"   },
    { id:70,  title:"Sunrise",        cat:"Nature"  },
    { id:80,  title:"Old Town",       cat:"Urban"   },
    { id:90,  title:"Wildflowers",    cat:"Nature"  },
    { id:100, title:"Night Market",   cat:"Urban"   },
    { id:110, title:"Desert Dunes",   cat:"Nature"  },
    { id:120, title:"Modern Bridge",  cat:"Urban"   },
    { id:130, title:"Autumn Leaves",  cat:"Nature"  },
    { id:140, title:"Rooftop View",   cat:"Urban"   },
    { id:150, title:"Waterfall",      cat:"Nature"  },
    { id:160, title:"Train Station",  cat:"Urban"   },
  ];

  let activeFilter = 'All';
  let lbIndex = 0;
  let filteredPhotos = [];

  // Build filter buttons
  const cats = ['All', ...new Set(photos.map(p => p.cat))];
  const filtersEl = document.getElementById('filters');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      activeFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    filtersEl.appendChild(btn);
  });

  function render() {
    filteredPhotos = photos.filter(p => activeFilter === 'All' || p.cat === activeFilter);
    const gallery = document.getElementById('gallery');
    const noItems = document.getElementById('no-items');

    if (filteredPhotos.length === 0) {
      gallery.innerHTML = '';
      noItems.style.display = 'block';
      return;
    }

    noItems.style.display = 'none';
    gallery.innerHTML = filteredPhotos.map((p, i) => `
      <div class="gallery-item" onclick="openLb(${i})">
        <img src="https://picsum.photos/id/${p.id}/600/400" alt="${p.title}" loading="lazy"/>
        <div class="overlay">
          <span class="caption">${p.title}</span>
        </div>
      </div>
    `).join('');
  }

  // Lightbox
  function openLb(i) {
    lbIndex = i;
    showLb();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLb() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function lbNav(dir) {
    lbIndex = (lbIndex + dir + filteredPhotos.length) % filteredPhotos.length;
    showLb();
  }

  function showLb() {
    const p = filteredPhotos[lbIndex];
    document.getElementById('lb-img').src = `https://picsum.photos/id/${p.id}/1200/800`;
    document.getElementById('lb-caption').textContent = `${p.title} · ${p.cat} · ${lbIndex+1} / ${filteredPhotos.length}`;
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
  });

  // Close on backdrop click
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLb();
  });

  render();
</script>

</body>
</html>
