<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quote Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="quote-box">
      <h1>Quote of the Day</h1>
      <div id="quoteDisplay" class="quote-display">
        <p id="quoteText">Loading...</p>
        <p id="quoteAuthor">- Author</p>
      </div>
      <div class="button-group">
        <button id="newQuoteBtn" class="btn btn-primary">New Quote</button>
        <button id="copyBtn" class="btn btn-secondary">Copy Quote</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
