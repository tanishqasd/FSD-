<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Toggle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <h1>My Website</h1>
    <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
  </nav>
  <div class="container">
    <h2>Welcome to Dark Mode Toggle</h2>
    <p>Click the button in the top right to toggle between light and dark modes. Your preference is saved!</p>
    <div class="card">
      <h3>Card 1</h3>
      <p>This is a sample card that changes color with the theme.</p>
    </div>
    <div class="card">
      <h3>Card 2</h3>
      <p>Try switching themes to see the magic!</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
