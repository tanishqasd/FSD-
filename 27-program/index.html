<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Array Sorter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Array Sorter</h1>
    <input type="text" id="input" placeholder="Enter numbers separated by commas">
    <div class="buttons">
      <button onclick="sort('asc')">Sort ↑ Ascending</button>
      <button onclick="sort('desc')">Sort ↓ Descending</button>
    </div>
    <div id="result" class="result"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
