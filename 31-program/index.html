<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎮 Rock Paper Scissors</h1>
    <div class="choices">
      <button onclick="play('rock')" class="choice">✊ Rock</button>
      <button onclick="play('paper')" class="choice">📄 Paper</button>
      <button onclick="play('scissors')" class="choice">✂️ Scissors</button>
    </div>
    <div id="result" class="result"></div>
    <div id="score" class="score">You: 0 | Computer: 0</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
