<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Currency Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💱 Currency Converter</h1>
    <input type="number" id="amount" placeholder="Amount" value="1">
    <select id="from"><option>USD</option><option>EUR</option><option>GBP</option></select>
    <select id="to"><option>EUR</option><option>USD</option><option>GBP</option></select>
    <button id="convertBtn" class="btn">Convert</button>
    <div id="result" class="result"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
